name: Build Android APK

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository without Node actions
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"

      - name: Compute branch label
        shell: bash
        run: |
          set -euo pipefail
          # Branch names can contain '/', which is invalid in file names and release tags.
          echo "SAFE_REF=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')" >> "$GITHUB_ENV"

      - name: Install Java and Gradle
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk unzip wget
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          java -version
          /tmp/gradle-8.9/bin/gradle --version

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          /tmp/gradle-8.9/bin/gradle :app:assembleDebug --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk "MockDrive-${SAFE_REF}.apk"
          test -s "MockDrive-${SAFE_REF}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: MockDrive-${{ env.SAFE_REF }}
          path: MockDrive-${{ env.SAFE_REF }}.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish installable APK release
        shell: bash
        run: |
          set -euo pipefail
          TAG="build-${SAFE_REF}-${GITHUB_RUN_NUMBER}"
          gh release create "${TAG}" "MockDrive-${SAFE_REF}.apk" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Mock Drive ${SAFE_REF} #${GITHUB_RUN_NUMBER}" \
            --notes "Automated Android build from ${GITHUB_REF_NAME} @ ${GITHUB_SHA}." \
            --prerelease
