name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository without Node actions
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"

      - name: Install Java and Gradle
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk unzip wget
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          java -version
          /tmp/gradle-8.9/bin/gradle --version

      - name: Prepare permanent signing when configured
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mockdrive-release.jks"
            chmod 600 "$RUNNER_TEMP/mockdrive-release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/mockdrive-release.jks" >> "$GITHUB_ENV"
            echo "Permanent signing key configured."
          else
            echo "WARNING: Permanent signing secrets are not configured. This build cannot update a differently signed installation."
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          /tmp/gradle-8.9/bin/gradle :app:assembleDebug --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk MockDrive.apk
          test -s MockDrive.apk

      - name: Create updater metadata
        shell: bash
        run: |
          set -euo pipefail
          TAG="build-${GITHUB_RUN_NUMBER}"
          VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))
          VERSION_NAME="1.2.${GITHUB_RUN_NUMBER}"
          APK_SIZE="$(stat -c%s MockDrive.apk)"
          APK_SHA256="$(sha256sum MockDrive.apk | awk '{print $1}')"
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/MockDrive.apk"
          cat > update.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "tag": "${TAG}",
            "apkName": "MockDrive.apk",
            "apkUrl": "${APK_URL}",
            "sizeBytes": ${APK_SIZE},
            "sha256": "${APK_SHA256}",
            "commit": "${GITHUB_SHA}",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat update.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MockDrive-APK
          path: |
            MockDrive.apk
            update.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish installable APK release
        shell: bash
        run: |
          set -euo pipefail
          TAG="build-${GITHUB_RUN_NUMBER}"
          gh release create "${TAG}" MockDrive.apk update.json \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Mock Drive build ${GITHUB_RUN_NUMBER}" \
            --notes "Automated Android development build from commit ${GITHUB_SHA}. Version code $((1000 + GITHUB_RUN_NUMBER))." \
            --prerelease
