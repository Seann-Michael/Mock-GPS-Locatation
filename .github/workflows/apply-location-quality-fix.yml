name: Apply location quality fix

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/apply_location_quality_fix.py'
      - '.github/workflows/apply-location-quality-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git checkout main

      - name: Apply source migration
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_location_quality_fix.py

      - name: Commit updated Android sources
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/seannmichael/mockdrive/MockLocationService.java \
                  app/src/main/java/com/seannmichael/mockdrive/SimulationDiagnostics.java \
                  app/src/main/java/com/seannmichael/mockdrive/HistoryDetailActivity.java
          git commit -m "Improve Fused GPS availability and fix quality"
          git push origin HEAD:main
